<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | Portal Gateway</title>
    <style>
        :root {
            --accent: #3b82f6;
            --bg: #050505;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gateway-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            animation: scan 4s linear infinite;
            z-index: 10;
        }
        h1 {
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 100;
            margin-bottom: 30px;
            color: rgba(255,255,255,0.8);
        }
        .terminal {
            font-size: 12px;
            color: var(--accent);
            text-align: left;
            margin-bottom: 40px;
            opacity: 0.6;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 10px;
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="gateway-container">
        <div class="scanline"></div>
        <h1>Portal_Core</h1>
        <div class="terminal">
            <div>> INITIALIZING_LIBRARIAN_V4.2.0... OK</div>
            <div>> SYNCING_NEURAL_PATHWAYS... OK</div>
            <div>> ESTABLISHING_VAULT_ENCRYPTION... OK</div>
            <div>> STATUS: SYSTEM_READY_FOR_DEPLOYMENT</div>
        </div>
        <a href="/" class="btn">
            <span class="pulse"></span>
            Initialize_Core
        </a>
    </div>
</body>
</html>
