<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(34, 197, 94, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
        .glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 168, 232, 0.1) 0%, transparent 70%);
            filter: blur(40px);
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }
        .terminal-text {
            border-right: 2px solid #00A8E8;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 2s steps(40, end), blink .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #00A8E8 } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="scanline"></div>
    <div class="glow"></div>

    <div class="z-10 text-center space-y-12 max-w-lg px-6">
        <div class="relative inline-block">
            <svg width="120" height="120" viewBox="0 0 200 200" class="mx-auto animate-pulse">
                <circle cx="100" cy="100" r="80" fill="none" stroke="#00A8E8" stroke-width="2" stroke-dasharray="10 20" />
                <circle cx="100" cy="100" r="60" fill="none" stroke="#00A8E8" stroke-width="8" opacity="0.8" />
                <circle cx="100" cy="100" r="20" fill="#00A8E8" />
            </svg>
        </div>

        <div class="space-y-4">
            <h1 class="text-xs uppercase tracking-[0.8em] text-white/40">Cabinet_Core_v4.2.0</h1>
            <div class="h-8 overflow-hidden">
                <p class="terminal-text text-xl font-bold text-blue-400 tracking-widest uppercase">Initializing_Neural_Sync...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 text-[10px] text-white/20 uppercase tracking-widest pt-8 border-t border-white/5">
            <div class="text-left">
                <p>Status: <span class="text-green-500">Online</span></p>
                <p>Uptime: <span id="uptime">00:00:00</span></p>
            </div>
            <div class="text-right">
                <p>Node: <span class="text-blue-400">Stable</span></p>
                <p>Port: <span class="text-blue-400">3000</span></p>
            </div>
        </div>

        <a href="/" class="block w-full py-4 bg-blue-600/10 border border-blue-500/30 hover:bg-blue-600 hover:text-white transition-all text-blue-400 font-bold tracking-[0.4em] uppercase text-xs rounded-sm group relative overflow-hidden">
            <span class="relative z-10">Engage_Portal</span>
            <div class="absolute inset-0 bg-blue-500/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
        </a>
    </div>

    <script>
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
        }, 1000);
    </script>
</body>
</html>
