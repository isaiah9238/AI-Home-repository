<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <style>
        body {
            background-color: #050505;
            color: #3b82f6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .loader {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(59, 130, 246, 0.1);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(59, 130, 246, 0.05);
            border-bottom: 1px solid #22c55e;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            font-size: 10px;
            margin-top: 10px;
            opacity: 0.6;
        }

        .glitch {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.1);
            opacity: 0.5;
            z-index: 100;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="loader"></div>
    <div class="glitch">System_Initializing</div>
    <div class="status">Neural_Sync: ACTIVE | Node: CABINET_V4</div>
    
    <a href="/" class="btn">ENGAGE_PORTAL</a>

    <script>
        // Optional: Auto-redirect after a few seconds if you want
        // setTimeout(() => { window.location.href = '/'; }, 3000);
    </script>
</body>
</html>
