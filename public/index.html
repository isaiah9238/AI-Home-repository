<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #00A8E8;
            --accent-dim: rgba(0, 168, 232, 0.2);
        }
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 168, 232, 0.1);
            z-index: 100;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        .terminal {
            width: 80%;
            max-width: 600px;
            padding: 40px;
            border: 1px solid var(--accent-dim);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }
        .line {
            margin-bottom: 10px;
            font-size: 12px;
            opacity: 0;
            transform: translateX(-10px);
            animation: fadeIn 0.5s forwards;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: var(--accent);
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        .action-link {
            margin-top: 30px;
            display: block;
            color: white;
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            font-weight: bold;
        }
        .action-link:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px var(--accent);
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="terminal">
        <div class="line" style="animation-delay: 0.2s;">> Initializing_Librarian_v4.2.0...</div>
        <div class="line" style="animation-delay: 0.5s;">> Syncing_Neural_Pathways... [OK]</div>
        <div class="line" style="animation-delay: 0.8s;">> Checking_Cabinet_Integrity... [STABLE]</div>
        <div class="line" style="animation-delay: 1.1s;">> Loading_Persona_Matrix... [READY]</div>
        <div class="line" style="animation-delay: 1.4s;">> Establishing_Home_Base_Sync... [ACTIVE]</div>
        
        <a href="/" class="action-link">INITIALIZE_CORE_INTERFACE</a>
        
        <div class="line" style="animation-delay: 2.0s; margin-top: 20px; font-size: 8px; opacity: 0.4;">
            SYSTEM_STATUS: ALL_NODES_OPERATIONAL <span class="cursor"></span>
        </div>
    </div>

    <script>
        // Redirect logic if preferred, but manual engagement is more "Cabinet" style
        // setTimeout(() => { window.location.href = "/"; }, 5000);
    </script>
</body>
</html>
