<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <style>
        body {
            background-color: #050505;
            color: #00A8E8;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 20;
        }
        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 2rem;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .loader {
            width: 300px;
            height: 2px;
            background: rgba(0, 168, 232, 0.1);
            position: relative;
            margin-top: 1rem;
        }
        .progress {
            position: absolute;
            height: 100%;
            background: #00A8E8;
            width: 0%;
            animation: load 3s forwards cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px #00A8E8;
        }
        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .status {
            font-size: 10px;
            margin-top: 1.5rem;
            opacity: 0.6;
            height: 1rem;
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        .grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 168, 232, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 168, 232, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 5;
            opacity: 0.3;
        }
    </style>
    <script>
        // Tactical Redirect Sequence
        setTimeout(() => {
            window.location.href = '/';
        }, 3500);
    </script>
</head>
<body>
    <div class="grid"></div>
    <div class="scanline"></div>
    <div class="container">
        <svg class="logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="80" stroke="#00A8E8" stroke-width="1" stroke-dasharray="10 20" />
            <circle cx="100" cy="100" r="60" stroke="#00A8E8" stroke-width="4" opacity="0.8" />
            <path d="M100 40 L100 160 M40 100 L160 100" stroke="#00A8E8" stroke-width="1" opacity="0.4" />
            <circle cx="100" cy="100" r="10" fill="#00A8E8" class="animate-pulse" />
        </svg>
        <div class="title" style="font-weight: bold; font-size: 18px;">Cabinet_Core_Initialized</div>
        <div class="loader">
            <div class="progress"></div>
        </div>
        <div class="status" id="status">Synchronizing_Neural_Nodes...</div>
    </div>
    <script>
        const statusText = [
            "Connecting_To_Librarian...",
            "Decrypting_Vault_Frequencies...",
            "Engaging_Discovery_Tutor...",
            "System_Identity_Stable.",
            "Handshake_Complete."
        ];
        let i = 0;
        const interval = setInterval(() => {
            if (i < statusText.length) {
                document.getElementById('status').innerText = statusText[i++];
            } else {
                clearInterval(interval);
            }
        }, 600);
    </script>
</body>
</html>
