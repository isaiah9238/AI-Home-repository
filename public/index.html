<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <style>
        body {
            background-color: #050505;
            color: #00A8E8;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .logo {
            width: 120px;
            height: 120px;
            border: 2px solid #00A8E8;
            border-radius: 50%;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 168, 232, 0.2);
            animation: pulse 4s infinite ease-in-out;
        }
        .logo-inner {
            width: 60px;
            height: 60px;
            background: #00A8E8;
            border-radius: 50%;
            opacity: 0.8;
        }
        .status {
            font-size: 10px;
            color: rgba(0, 168, 232, 0.4);
            margin-top: 1rem;
        }
        .terminal {
            margin-top: 2rem;
            font-size: 12px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2.5rem;
            border-radius: 4px;
            transition: all 0.3s;
            background: rgba(0, 168, 232, 0.05);
        }
        .terminal:hover {
            background: #00A8E8;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 168, 232, 0.5);
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 168, 232, 0.1);
            z-index: 100;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(100vh); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="logo">
            <div class="logo-inner"></div>
        </div>
        <h1>Cabinet_Initialization</h1>
        <div class="status">Neural_Nodes: Syncing...</div>
        <div class="status">Librarian: Online</div>
        <div style="margin-top: 3rem;">
            <a href="/" class="terminal">Enter_Neural_Interface</a>
        </div>
    </div>
</body>
</html>
