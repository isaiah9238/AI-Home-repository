<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | System Initialization</title>
    <style>
        body {
            background-color: #050505;
            color: #00A8E8;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }
        #terminal {
            width: 80%;
            max-width: 600px;
            text-align: left;
            min-height: 200px;
        }
        .line {
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
            font-size: 14px;
            letter-spacing: 1px;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .progress-bar {
            width: 80%;
            max-width: 600px;
            height: 2px;
            background: rgba(0, 168, 232, 0.1);
            margin-top: 40px;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00A8E8;
            transition: width 2s ease-in-out;
        }
        #btn-enter {
            margin-top: 60px;
            padding: 15px 40px;
            border: 1px solid #00A8E8;
            background: transparent;
            color: #00A8E8;
            cursor: pointer;
            letter-spacing: 5px;
            opacity: 0;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: bold;
        }
        #btn-enter:hover {
            background: #00A8E8;
            color: #050505;
            box-shadow: 0 0 30px rgba(0, 168, 232, 0.6);
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="terminal"></div>
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <button id="btn-enter" onclick="window.location.href='/'">Initialize_Session</button>

    <script>
        const lines = [
            "Initializing Cabinet Core V4.2.0...",
            "Checking Node_Runtime: Version 22 Synchronized.",
            "Loading Neural Pathways (Next.js 15.5.14)...",
            "Librarian Protocol: Operational.",
            "Auth_Node: Bypass_Mode_Engaged.",
            "Port_Sync: 3000.",
            "Status: System_Optimal."
        ];
        const terminal = document.getElementById('terminal');
        const fill = document.getElementById('fill');
        const btn = document.getElementById('btn-enter');

        let i = 0;
        function type() {
            if (i < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = `> ${lines[i]}`;
                div.style.animationDelay = `${i * 0.3}s`;
                terminal.appendChild(div);
                i++;
                setTimeout(type, 400);
            } else {
                fill.style.width = '100%';
                setTimeout(() => {
                    btn.style.opacity = '1';
                }, 800);
            }
        }
        type();
    </script>
</body>
</html>
