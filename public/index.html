<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Home | Portal Gateway</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #3b82f6;
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .terminal {
            width: 80%;
            max-width: 600px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-radius: 8px;
            position: relative;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.1);
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .logo {
            font-size: 12px;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .status {
            font-size: 14px;
            line-height: 1.8;
            margin-top: 30px;
        }

        .line {
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--accent);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            animation: fadeIn 1s 3s forwards;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1s; }
        .delay-3 { animation-delay: 1.5s; }
        .delay-4 { animation-delay: 2s; }
        .delay-5 { animation-delay: 2.5s; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <div class="logo">The _Cabinet_V4.2.0</div>

        <div class="status">
            <div class="line delay-1">> INITIALIZING_BOOT_SEQUENCE...</div>
            <div class="line delay-2">> SYNCHRONIZING_NEURAL_PATHWAYS... [OK]</div>
            <div class="line delay-3">> LIBRARIAN_STATUS: OPERATIONAL</div>
            <div class="line delay-4">> SYSTEM_INTEGRITY: OPTIMAL</div>
            <div class="line delay-5">> WAITING_FOR_USER_SIGNAL<span class="cursor"></span></div>
        </div>

        <button class="btn" onclick="window.location.href='/'">Engage_Portal</button>
    </div>

    <script>
        // Automatic redirection after a few seconds if they don't click
        setTimeout(() => {
            window.location.href = '/';
        }, 8000);
    </script>
</body>
</html>
